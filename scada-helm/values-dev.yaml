namespaces:
  app: scada-system
  soc: soc

frontend:
  replicaCount: 2
  image: digigrad/scada-frontend:v8
  strategy:
      maxSurge: 1
      maxUnavailable: 1
  service:
    type: ClusterIP
    port: 80
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

backend:
  replicaCount: 2
  image: digigrad/factory-backend:v4
  strategy:
    maxSurge: 1
    maxUnavailable: 1
  service:
    type: ClusterIP
    port: 8000
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

mysql:
  image: mysql:8.0
  storage: 2Gi
  database: scada_db
  user: scada_user
  service:
    port: 3306

secrets:
  mysqlRootPassword: Root@123
  mysqlPassword: StrongPass123!
  appKey: "base64:VYkot/f8qaPncPVEFu4n/RQMloQNxLn1E7ofeO1Ca/s="

config:
  APP_NAME: Laravel
  APP_ENV: local
  APP_DEBUG: "true"
  APP_URL: http://localhost
  DB_CONNECTION: mysql
  DB_HOST: mysql
  DB_PORT: "3306"

ingress:
  enabled: true
  host: scada-dev.local

hpa:
  backend:
    minReplicas: 2
    maxReplicas: 10
    targetCPU: 70

  frontend:
    minReplicas: 2
    maxReplicas: 10
    targetCPU: 70

networkPolicy:
  enabled: true


soc:
  enabled: true

  replicaCount: 1

  image:
    repository: digigrad/soc
    tag: v1

  service:
    type: ClusterIP
    port: 5000

  model: llama3.2

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

agent:
  enabled: true

  replicaCount: 1

  image:
    repository: digigrad/ai-agent
    tag: v4

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

ollama:
  enabled: true

  replicaCount: 1

  image:
    repository: digigrad/ollama
    tag: v1.0.1

  service:
    type: ClusterIP
    port: 11434

  persistence:
    enabled: true
    size: 10Gi

  model:
    name: llama3.2

  resources:
    requests:
      cpu: "500m"
      memory: 1Gi
    limits:
      cpu: "1"
      memory: 2Gi