apiVersion: batch/v1
kind: Job
metadata:
  name: mysql-init-job
  namespace: {{ .Values.namespaces.app }}
  annotations:
    "helm.sh/hook": post-install
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 600

  template:
    spec:
      restartPolicy: OnFailure

      initContainers:
        - name: copy-sql
          image: {{ .Values.mysql.image }}
          imagePullPolicy: Always
          command:
            - sh
            - -c
            - |
              echo "Copying SQL file to shared volume..."
              cp /init/scada_system.sql /sql/scada_system.sql
              echo "Done."
          volumeMounts:
            - name: sql-data
              mountPath: /sql

      containers:
        - name: mysql-import
          image: {{ .Values.mysql.image }}
          imagePullPolicy: Always

          command:
            - sh
            - -c
            - |
              set -e

              echo "Waiting for MySQL to be ready..."
              until mysqladmin ping \
                -h mysql \
                -uroot \
                -p"$MYSQL_ROOT_PASSWORD" \
                --silent; do
                  echo "  MySQL not ready yet — retrying in 5s..."
                  sleep 5
              done

              echo "MySQL is ready. Importing SQL..."
              mysql \
                -h mysql \
                -uroot \
                -p"$MYSQL_ROOT_PASSWORD" \
                --max_allowed_packet=512M \
                --connect-timeout=60 \
                {{ .Values.mysql.database }} < /sql/scada_system.sql

              echo "SQL import completed successfully."

          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_ROOT_PASSWORD

          volumeMounts:
            - name: sql-data
              mountPath: /sql

      volumes:
        - name: sql-data
          emptyDir: {}