{{- if .Values.networkPolicy.enabled }}

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: agent-allow
  namespace: {{ .Values.namespaces.soc }}

spec:
  podSelector:
    matchLabels:
      app: ai-agent

  policyTypes:
    - Egress

  egress:

    - to:
        - podSelector:
            matchLabels:
              app: soc

      ports:
        - protocol: TCP
          port: 5000

    - to:
        - podSelector:
            matchLabels:
              app: ollama

      ports:
        - protocol: TCP
          port: 11434

    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system

      ports:
        - protocol: UDP
          port: 53

        - protocol: TCP
          port: 53

{{- end }}