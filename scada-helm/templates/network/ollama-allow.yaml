{{- if .Values.networkPolicy.enabled }}

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ollama-allow
  namespace: {{ .Values.namespaces.soc }}

spec:
  podSelector:
    matchLabels:
      app: ollama

  policyTypes:
    - Ingress
    - Egress

  ingress:

    - from:
        - podSelector:
            matchLabels:
              app: soc

      ports:
        - protocol: TCP
          port: 11434

    - from:
        - podSelector:
            matchLabels:
              app: ai-agent

      ports:
        - protocol: TCP
          port: 11434

  egress:

    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system

      ports:
        - protocol: UDP
          port: 53

        - protocol: TCP
          port: 53

{{- end }}