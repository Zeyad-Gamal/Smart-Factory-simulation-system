{{- if and .Values.ollama.enabled .Values.ollama.persistence.enabled }}

apiVersion: v1
kind: PersistentVolumeClaim

metadata:
  name: ollama-pvc
  namespace: {{ .Values.namespaces.soc }}

spec:
  accessModes:
    - ReadWriteOnce

  resources:
    requests:
      storage: {{ .Values.ollama.persistence.size }}

{{- end }}