{{- if .Values.ollama.enabled }}

apiVersion: apps/v1
kind: Deployment

metadata:
  name: ollama
  namespace: {{ .Values.namespaces.soc }}

spec:
  replicas: {{ .Values.ollama.replicaCount }}

  selector:
    matchLabels:
      app: ollama

  template:
    metadata:
      labels:
        app: ollama

    spec:
      containers:

        - name: ollama

          image: "{{ .Values.ollama.image.repository }}:{{ .Values.ollama.image.tag }}"
          imagePullPolicy: Always

          ports:
            - containerPort: 11434

          volumeMounts:
            - name: ollama-storage
              mountPath: /root/.ollama

          readinessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 5

          livenessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 60
            periodSeconds: 30

          resources:
            requests:
              cpu: {{ .Values.ollama.resources.requests.cpu }}
              memory: {{ .Values.ollama.resources.requests.memory }}

            limits:
              cpu: {{ .Values.ollama.resources.limits.cpu }}
              memory: {{ .Values.ollama.resources.limits.memory }}

      volumes:
        - name: ollama-storage
          persistentVolumeClaim:
            claimName: ollama-pvc

{{- end }}