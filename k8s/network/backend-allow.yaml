apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: backend-allow
  namespace: scada-system
spec:
  podSelector:
    matchLabels:
      app: backend
  policyTypes:
    - Ingress
    - Egress

  ingress:
    # Allow frontend to call backend
    - from:
        - podSelector:
            matchLabels:
              app: frontend
      ports:
        - protocol: TCP
          port: 8000

    # Allow SOC to call backend (from soc namespace)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: soc
      ports:
        - protocol: TCP
          port: 8000

  egress:
    # Allow backend to call MySQL
    - to:
        - podSelector:
            matchLabels:
              app: mysql
      ports:
        - protocol: TCP
          port: 3306

    # Allow DNS resolution
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

    # Allow backend to call SOC (send logs/alerts)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: soc
      ports:
        - protocol: TCP
          port: 5000