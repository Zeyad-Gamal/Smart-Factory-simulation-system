apiVersion: batch/v1
kind: Job
metadata:
  name: mysql-init-job
  namespace: scada-system
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 600

  template:
    spec:
      restartPolicy: Never

      containers:
        - name: mysql-import
          image: mysql:8.0

          command:
            - sh
            - -c
            - |
              set -e

              echo "Waiting for MySQL..."

              until mysqladmin ping -h mysql -uroot -p"$MYSQL_ROOT_PASSWORD" --silent; do
                sleep 5
              done

              echo "Importing SQL..."

              mysql -h mysql -uroot -p"$MYSQL_ROOT_PASSWORD" scada_db < /sql/scada_system.sql

              echo "Done."

          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_ROOT_PASSWORD

          volumeMounts:
            - name: sql
              mountPath: /sql

      volumes:
        - name: sql
          configMap:
            name: mysql-init-sql