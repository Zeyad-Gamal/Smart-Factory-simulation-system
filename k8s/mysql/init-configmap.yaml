apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-init-sql
  namespace: scada-system
data:
  scada_system.sql: |
    -- paste your full SQL dump here
    -- example:
    CREATE DATABASE IF NOT EXISTS scada_db;

    USE scada_db;

    CREATE TABLE users (
      id INT AUTO_INCREMENT PRIMARY KEY,
      name VARCHAR(100)
    );