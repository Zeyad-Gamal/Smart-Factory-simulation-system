# This PV is only needed if you are NOT using dynamic provisioning
# (e.g. bare-metal / on-prem clusters without a StorageClass that
# provisions automatically).
#
# Cloud clusters (GKE, EKS, AKS) and most modern on-prem setups with
# a CSI driver can delete this file entirely — the PVC will be
# satisfied automatically by the default StorageClass.
#
# For bare-metal: replace `kubernetes.io/hostname: <NODE_NAME>` with
# the actual node name where the SQL data directory lives, and ensure
# the directory exists on that node before applying.

apiVersion: v1
kind: PersistentVolume
metadata:
  name: mysql-sql-pv
spec:
  capacity:
    storage: 1Gi
  volumeMode: Filesystem
  accessModes:
    - ReadOnlyMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-storage   # must match the StorageClass name in your cluster

  local:
    path: /data/mysql-init           # must exist on the pinned node

  # Required for local volumes — ties the PV to a specific node.
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - minikube     # ← replace with your actual node name