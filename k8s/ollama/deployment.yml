apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: soc
  labels:
    app: ollama
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
        - name: ollama
          image: digigrad/ollama:v1.0.1  # ← replace with your image
          imagePullPolicy: Always
          ports:
            - containerPort: 11434
          volumeMounts:
            - name: ollama-storage
              mountPath: /root/.ollama
          resources:
            requests:
              memory: "4Gi"
              cpu:    "2"
            limits:
              memory: "8Gi"
              cpu:    "4"
          readinessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 60
            periodSeconds: 30
      volumes:
        - name: ollama-storage
          persistentVolumeClaim:
            claimName: ollama-pvc