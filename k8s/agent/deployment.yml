apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-agent
  namespace: soc
  labels:
    app: ai-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-agent
  template:
    metadata:
      labels:
        app: ai-agent
    spec:
      containers:
        - name: agent
          image: digigrad/ai-agent:v1  # ← replace with your image
          envFrom:
            - configMapRef:
                name: soc-config
          resources:
            requests:
              memory: "128Mi"
              cpu:    "100m"
            limits:
              memory: "256Mi"
              cpu:    "200m"