apiVersion: v1
kind: Service
metadata:
  name: soc-service
  namespace: soc
spec:
  selector:
    app: soc
  ports:
    - name: http
      port: 5000
      targetPort: 5000
  type: ClusterIP
  # Use NodePort if no LoadBalancer available:
  # type: NodePort
  # ports:
  #   - port: 5000
  #     targetPort: 5000
  #     nodePort: 30500