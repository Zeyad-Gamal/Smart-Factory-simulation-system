[supervisord]
nodaemon=true
user=root
logfile=/var/www/storage/logs/supervisord.log
logfile_maxbytes=10MB

[program:laravel-server]
command=php /var/www/artisan serve --host=0.0.0.0 --port=8000
directory=/var/www
autostart=true
autorestart=true
stdout_logfile=/var/www/storage/logs/server.log
stderr_logfile=/var/www/storage/logs/server-error.log

[program:laravel-scheduler]
command=php /var/www/artisan schedule:work
directory=/var/www
autostart=true
autorestart=true
stdout_logfile=/var/www/storage/logs/scheduler.log
stderr_logfile=/var/www/storage/logs/scheduler-error.log